@font-face {

  font-style: normal;
  font-weight: 800;
  font-display: swap;

  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;

<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }

  :root {
    /* surfaces */
    --paper: #ffffff;
    --bg: #f4f3ef;
    --bg-2: #eceae3;
    --ink-surface: #15171c;

    /* ink / text */
    --ink: #15171c;
    --ink-2: #3c414a;
    --muted: #80868f;
    --faint: #aeb2b8;
    --on-dark: #f3f2ee;
    --on-dark-muted: #a7abb0;

    /* lines */
    --line: #e4e1d9;
    --line-2: #d6d2c8;
    --line-dark: #2b2e35;

    /* accent — forest green */
    --accent: #1e7a4e;
    --accent-strong: #165e3c99;
    --accent-strong-h: #115030;
    --accent-soft: #d4ece1;
    --accent-tint: #edf7f1;
    --accent-ink: #08231a;

    /* status */
    --ok: #2f7d52;
    --ok-soft: #e4f0e9;
    --warn: #b07a16;
    --sale: #b23a26;

    /* type */
    --sans: 'Manrope', ui-sans-serif, system-ui, -apple-system, sans-serif;
    --mono: 'IBM Plex Mono', ui-monospace, 'SF Mono', Menlo, monospace;

    /* radii */
    --r-xs: 3px;
    --r-sm: 5px;
    --r-md: 8px;
    --r-lg: 12px;

    /* shadow */
    --sh-sm: 0 1px 2px rgba(21,23,28,.05), 0 1px 1px rgba(21,23,28,.04);
    --sh-md: 0 4px 14px rgba(21,23,28,.07), 0 1px 3px rgba(21,23,28,.05);
    --sh-lg: 0 18px 50px rgba(21,23,28,.13), 0 4px 12px rgba(21,23,28,.07);

    --maxw: 1320px;
  }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--sans);
    font-size: 15px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  /* ---------- typography helpers ---------- */
  .u-label {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: .14em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .u-mono { font-family: var(--mono); font-feature-settings: "tnum" 1; }
  .u-tnum { font-feature-settings: "tnum" 1; font-variant-numeric: tabular-nums; }
  .u-display { font-weight: 800; letter-spacing: -.02em; line-height: 1.05; }
  h1, h2, h3 { margin: 0; font-weight: 700; letter-spacing: -.015em; line-height: 1.1; }

  a { color: inherit; text-decoration: none; }

  /* ---------- layout ---------- */
  .wrap { max-width: var(--maxw); margin: 0 auto; padding: 0 28px; }

  /* ---------- buttons ---------- */
  .btn {
    appearance: none; cursor: pointer; border: none; outline: none;
    font-family: var(--sans); font-weight: 600; font-size: 14px;
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    padding: 0 18px; height: 44px; border-radius: var(--r-sm);
    transition: background .15s, color .15s, border-color .15s, transform .04s;
    white-space: nowrap; line-height: 1;
  }
  .btn:active { transform: translateY(1px); }
  .btn-primary { background: var(--ink); color: var(--on-dark); }
  .btn-primary:hover { background: #25282f; }
  .btn-accent { background: var(--accent); color: #fff; }
  .btn-accent:hover { background: var(--accent-strong-h); }
  .btn-ghost { background: transparent; color: var(--ink); border: 1px solid var(--line-2); }
  .btn-ghost:hover { border-color: var(--ink); background: #fff; }
  .btn-soft { background: var(--bg-2); color: var(--ink); }
  .btn-soft:hover { background: #e3e0d8; }
  .btn-sm { height: 38px; font-size: 13px; padding: 0 14px; }
  .btn-lg { height: 50px; font-size: 15px; padding: 0 26px; }
  .btn-block { width: 100%; }
  .btn-icon { width: 44px; padding: 0; }

  /* ---------- chips / pills / badges ---------- */
  .chip {
    display: inline-flex; align-items: center; gap: 6px;
    font-family: var(--mono); font-size: 11.5px; font-weight: 500;
    padding: 4px 9px; border-radius: var(--r-xs);
    background: var(--bg-2); color: var(--ink-2); border: 1px solid transparent;
    white-space: nowrap;
  }
  .chip-line { background: var(--paper); border-color: var(--line-2); }
  .chip-accent { background: var(--accent-tint); color: var(--accent); border-color: var(--accent-soft); }
  .badge {
    display: inline-flex; align-items: center; gap: 5px;
    font-family: var(--mono); font-size: 10.5px; font-weight: 600; letter-spacing: .04em;
    padding: 3px 7px; border-radius: var(--r-xs); text-transform: uppercase;
  }
  .badge-sale { background: var(--sale); color: #fff; }
  .badge-new { background: var(--ink); color: var(--on-dark); }
  .badge-hit { background: var(--accent); color: #fff; }
  .stock { display: inline-flex; align-items: center; gap: 6px; font-size: 12.5px; font-weight: 600; color: var(--ok); }
  .stock::before { content: ""; width: 7px; height: 7px; border-radius: 50%; background: var(--ok); box-shadow: 0 0 0 3px var(--ok-soft); }
  .stock.order { color: var(--warn); }
  .stock.order::before { background: var(--warn); box-shadow: 0 0 0 3px #f3ead3; }

  /* ---------- surfaces ---------- */
  .card { background: var(--paper); border: 1px solid var(--line); border-radius: var(--r-md); }
  .hairline { height: 1px; background: var(--line); border: none; margin: 0; }

  /* ---------- product glyph (geometric module illustration) ---------- */
  .glyph { display: block; }

  /* hover affordance for clickable */
  .lift { transition: box-shadow .16s, border-color .16s, transform .16s; }
  .lift:hover { box-shadow: var(--sh-md); border-color: var(--line-2); }

  /* scrollbars */
  ::-webkit-scrollbar { height: 10px; width: 10px; }
  ::-webkit-scrollbar-thumb { background: #d3cfc5; border-radius: 20px; border: 2px solid var(--bg); }
  ::-webkit-scrollbar-track { background: transparent; }

  /* interaction states */
  .nav-link:hover { background: var(--bg-2); color: var(--ink); }
  .crumb-link:hover, .foot-link:hover, .util-link:hover { color: var(--accent) !important; }
  .hdr-icon:hover { color: var(--accent); }
  .card-title:hover { color: var(--accent); }
  .filter-check:hover span:last-child, .filter-check:hover { color: var(--ink); }
  .search-bar:hover { box-shadow: 0 0 0 3px rgba(189,122,28,.12); }
  .cat-card:hover .glyph { transform: scale(1.04); transition: transform .2s; }

  /* image placeholder slot */
  .ph {
    background-color: var(--bg-2);
    background-image: repeating-linear-gradient(135deg, transparent 0 7px, rgba(21,23,28,.035) 7px 8px);
    display: flex; align-items: center; justify-content: center;
    color: var(--faint); font-family: var(--mono); font-size: 11px; letter-spacing: .05em;
    border-radius: var(--r-sm);
  }

  /* ---------- prototype toolbar ---------- */
  .proto-bar {
    position: sticky; top: 0; z-index: 60;
    background: rgba(21,23,28,.96); backdrop-filter: blur(8px);
    color: var(--on-dark); border-bottom: 1px solid var(--line-dark);
  }
  .proto-inner { max-width: 1480px; margin: 0 auto; padding: 9px 22px; display: flex; align-items: center; gap: 18px; }
  .proto-brand { display: flex; align-items: center; gap: 10px; }
  .proto-logo { font-family: var(--sans); font-weight: 800; font-size: 15px; letter-spacing: -.02em; background: var(--accent); color:#fff; width: 28px; height: 28px; border-radius: var(--r-xs); display: flex; align-items: center; justify-content: center; }
  .proto-title { font-size: 13px; font-weight: 600; }
  .proto-sub { font-size: 11px; color: var(--on-dark-muted); }
  .proto-tabs { display: flex; gap: 3px; margin-left: auto; flex-wrap: wrap; }
  .proto-tab { appearance: none; cursor: pointer; background: transparent; border: 1px solid transparent; color: var(--on-dark-muted); font-family: var(--sans); font-size: 13px; font-weight: 500; padding: 6px 13px; border-radius: var(--r-sm); white-space: nowrap; transition: .12s; }
  .proto-tab:hover { color: #fff; background: rgba(255,255,255,.07); }
  .proto-tab.is-active { color: var(--ink); background: var(--on-dark); font-weight: 700; }
  .proto-back { appearance: none; cursor: pointer; width: 32px; height: 32px; border-radius: var(--r-sm); border: 1px solid var(--line-dark); background: transparent; color: var(--on-dark); font-size: 15px; }
  .proto-back:disabled { opacity: .35; cursor: default; }

  .stage { min-height: 100vh; }

  /* ---------- responsive ---------- */
  .hide-sm { }
  @media (max-width: 1080px) {
    .hide-md { display: none !important; }
    .cat-grid { grid-template-columns: repeat(3, 1fr) !important; }
    .prod-grid { grid-template-columns: repeat(3, 1fr) !important; }
    .footer-grid { grid-template-columns: 1.4fr 1fr 1fr !important; }
  }
  @media (max-width: 920px) {
    .hero-grid { grid-template-columns: 1fr !important; }
    .trust-strip { grid-template-columns: repeat(2, 1fr) !important; }
    .trust-strip > div:nth-child(3) { border-left: none !important; }
    .trust-strip > div:nth-child(n+3) { border-top: 1px solid var(--line); }
  }
  @media (max-width: 720px) {
    .wrap { padding: 0 18px; }
    .hide-lg { display: none !important; }
    .cat-grid { grid-template-columns: repeat(2, 1fr) !important; }
    .prod-grid { grid-template-columns: repeat(2, 1fr) !important; }
    .footer-grid { grid-template-columns: 1fr 1fr !important; gap: 28px !important; }
  }
  @media (max-width: 560px) {
    .hide-sm { display: none !important; }
    .trust-strip, .cat-grid, .prod-grid { grid-template-columns: 1fr !important; }
  }

  /* list & detail layouts */
  @media (max-width: 1080px) {
    .filter-sidebar { display: none !important; }
    .prod-grid-3 { grid-template-columns: repeat(2, 1fr) !important; }
    .product-layout, .cart-layout { grid-template-columns: 1fr !important; }
    .buy-box, .summary-box { position: static !important; }
  }
  @media (max-width: 720px) {
    .prod-grid-3 { grid-template-columns: 1fr !important; }
    .gallery-thumbs { display: none !important; }
    .delivery-grid { grid-template-columns: 1fr !important; }
    .cart-row { flex-wrap: wrap; }
  }

  /* reveal — base state is visible; animation only nudges position so a
     paused/background frame never hides content (safe for screenshots/export) */
  @media (prefers-reduced-motion: no-preference) {
    .reveal { animation: rise .45s cubic-bezier(.2,.7,.3,1) both; }
    @keyframes rise { from { transform: translateY(9px); } to { transform: none; } }
  }
</style>

</head>
